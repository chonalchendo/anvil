version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - contextcheck
    - errorlint
    - gocritic
    - gosec
    - misspell
    - nilerr
    - revive
  settings:
    errcheck:
      # Cobra/fmt writes to cmd.OutOrStdout()/cmd.ErrOrStderr() can't recover from a
      # write error mid-command; ignoring them is the framework's own convention.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    paths:
      - bin
      - .scratch
      - .worktrees

formatters:
  enable:
    - gofumpt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
