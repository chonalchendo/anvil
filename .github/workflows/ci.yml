name: ci
on:
  pull_request:
  push:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt findings:" >&2
            echo "$fmt_out" >&2
            exit 1
          fi

      - name: golangci-lint
        run: go tool -modfile=tool.go.mod golangci-lint run ./...

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: anvil init + validate (smoke)
        run: |
          mkdir -p /tmp/anvil-vault-ci
          go run ./cmd/anvil init /tmp/anvil-vault-ci
          go run ./cmd/anvil validate /tmp/anvil-vault-ci
